<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roovero Mockups Viewer</title>
  <style>
    body {
      margin: 0;
      padding: 40px 20px;
      background: #111;
      font-family: system-ui, -apple-system, sans-serif;
    }
    h1 {
      color: #fff;
      text-align: center;
      margin-bottom: 40px;
    }
    .mockups-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 40px;
      max-width: 2400px;
      margin: 0 auto;
    }
    .mockup-wrapper {
      position: relative;
      background: #fff;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .mockup-wrapper h2 {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      margin: 0;
      padding: 15px 20px;
      background: rgba(0,0,0,0.7);
      color: #fff;
      font-size: 16px;
      z-index: 10;
    }
    iframe {
      display: block;
      width: 100%;
      height: 812px;
      border: none;
    }
  </style>
</head>
<body>
  <h1>Roovero Mobile App Mockups</h1>
  <div class="mockups-grid">
    <div class="mockup-wrapper">
      <iframe src="./screenshots/01-calendar.html"></iframe>
      <h2>Content Calendar</h2>
    </div>
    <div class="mockup-wrapper">
      <iframe src="./screenshots/02-approval.html"></iframe>
      <h2>Approval Flow</h2>
    </div>
    <div class="mockup-wrapper">
      <iframe src="./screenshots/03-edit.html"></iframe>
      <h2>Edit Requests</h2>
    </div>
    <div class="mockup-wrapper">
      <iframe src="./screenshots/04-analytics.html"></iframe>
      <h2>Analytics</h2>
    </div>
    <div class="mockup-wrapper">
      <iframe src="./screenshots/05-published.html"></iframe>
      <h2>Published Confirmation</h2>
    </div>
  </div>
</body>
</html>
